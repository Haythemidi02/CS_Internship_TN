services:
  # ── Backend API ──────────────────────────────────────────────────────────────
  - type: web
    name: ensi-internship-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: SECRET_KEY
        generateValue: true          # Render auto-generates a secure value
      - key: ALLOWED_ORIGINS
        value: https://ensi-internship.vercel.app  # update after frontend deploy
      - key: DATABASE_URL
        fromDatabase:
          name: ensi-internship-db
          property: connectionString

  # ── PostgreSQL Database ──────────────────────────────────────────────────────
databases:
  - name: ensi-internship-db
    databaseName: internship_db
    user: internship_user
    plan: free
